<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/cadastro.css}">
</head>
<body>
    <main class="login-container">
        <!-- Seção da Imagem -->
        <section class="image-section">
            <img th:src="@{/img/ImagemDeCadastro-cadastro.png}" alt="Ilustração de cadastro de usuário">
        </section>

        <!-- Seção do Formulário -->
        <section class="form-section">
            <div class="form-content">
                <h1>Cadastro</h1>

                <p th:if="${sucesso}" th:text="${sucesso}"></p>

                <p th:if="${erro}" th:text="${erro}"></p>

                <form th:action="@{/cadastro}" method="post" class="register-form">
                    
                    <!-- Nome Completo -->
                    <div class="input-group">
                        <label for="nomeCompleto">Nome Completo</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="nomeCompleto" 
                            placeholder="Seu nome completo"
                            required
                            autocomplete="name">
                    </div>

                    <!-- E-mail -->
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                            autocomplete="email">
                    </div>

                    <!-- Senha -->
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="password" 
                                name="senha" 
                                placeholder="Crie uma senha"
                                required
                                minlength="6"
                                autocomplete="new-password">
                            <button type="button" class="toggle-password" aria-label="Alternar visibilidade da senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Tipo de Usuário -->
                    <div class="input-group">
                        <label for="tipoUsuario">Tipo de Usuário</label>
                        <select id="tipoUsuario" name="tipoUsuario" required>
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="PROFESSOR">PROFESSOR 🧑‍🏫</option>
                            <option value="ALUNO">ALUNO 🧑‍🎓</option>
                            <option value="RESPONSAVEL">RESPONSAVEL 👨‍👩‍👧‍👦</option>
                        </select>
                    </div>

                    <!-- Botão de Envio -->
                    <button type="submit" class="btn-register">Cadastrar</button>

                    <!-- Link para Login -->
                    <p class="login-text">
                        Já tem uma conta? <a th:href="@{login}">Fazer Login</a>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
