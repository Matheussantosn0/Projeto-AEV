<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha</title>
    <link rel="stylesheet" th:href="@{/css/enviar-codigo.css}">
</head>

<body>

    <div class="login-container">
        <div class="image-section">
            <!-- Mantém a mesma imagem do login para consistência visual -->
            <img th:src="@{/img/imagemDerecuperacao.png}" alt="Ilustração de Recuperação">
        </div>

        <div class="card">
            <h1>Digite o Código</h1>
            <p class="sub">Insira o código de 6 dígitos enviado para o seu email. Válido por 15 minutos.</p>

            <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
            <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>

            <form th:action="@{/recuperar-senha/enviar-codigo}" method="post">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:value="${email}" required readonly>

                <label for="codigo">Código</label>
                <input type="text" id="codigo" name="codigo" maxlength="6" placeholder="000000" pattern="\d{6}" required
                    autofocus>

                <button type="submit">Verificar código</button>
            </form>

            <a th:href="@{/recuperar-senha}" class="voltar">← Solicitar novo código</a>

            <p class="back-to-login">
                Lembrou sua senha? <a th:href="@{/login}">Voltar para o Login</a>
            </p>
            </form>
        </div>
    </div>
</body>

</html>
