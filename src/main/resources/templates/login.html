<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="login-container">
        <div class="image-section">
            <!-- Colocar a minha -->
            <img th:src="@{/img/ImagemDeLogin-Login.png}" alt="Ilustração de Login">
        </div>

        <div class="form-section">
            <div class="form-content">
                <h1>Login</h1>

                <p th:if="${sucesso}" th:text="${sucesso}"></p>

                <p th:if="${erro}" th:text="${erro}"></p>
                
                <!-- Link para o menu -->
                <form th:action="@{/login}" method="post">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Seu e-mail">
                    </div>

                    <!-- Novo bloco para senha com botão de ver -->
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <div class="password-container">
                            <input type="password" id="password" name="senha" placeholder="Sua senha">
                            <!-- Ícone de Olho (SVG) -->
                            <span class="toggle-password">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="options-row">
                        <a th:href="@{/recuperar-senha}" class="forgot-link">Esqueceu a senha?</a>
                    </div>

                    <a th:href="@{/portal}">
                    <button type="submit" class="btn-login">Conectar</button>
                    </a>

                    <p class="signup-text">
                        Não tem uma conta? <a th:href="@{/cadastro}">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
